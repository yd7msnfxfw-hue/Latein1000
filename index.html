<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vocabula Pro - Latein SRS</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:wght@500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .font-serif { font-family: 'Lora', serif; }
        html, body { overscroll-behavior-y: contain; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const iconPaths = {
            BookOpen: '<path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>',
            Database: '<ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>',
            Play: '<polygon points="5 3 19 12 5 21 5 3"/>',
            Trash2: '<polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/>',
            Check: '<polyline points="20 6 9 17 4 12"/>',
            X: '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>',
            BarChart2: '<line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>',
            Calendar: '<rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>',
            Upload: '<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>',
            List: '<line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>',
            Clock: '<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>'
        };

        const Icon = ({ name, className = "w-5 h-5" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} dangerouslySetInnerHTML={{ __html: iconPaths[name] || iconPaths.Check }} />
        );

        const generateId = () => typeof crypto !== 'undefined' && crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).substring(2, 15);

        // Verzeihender Abgleich für die 4 Formen (ignoriert Kommas und überflüssige Leerzeichen)
        const normalizeForms = (str) => str ? str.toLowerCase().replace(/[,;\s]+/g, ' ').trim() : '';
        const checkMatchForms = (input, target) => normalizeForms(input) === normalizeForms(target);

        const autoDetectDeklination = (stamm, formen) => {
            if (!formen) return '';
            // Nimm das zweite Wort (Genitiv Sg) zur Erkennung
            const parts = formen.split(/[,;\s]+/).filter(Boolean);
            if (parts.length < 2) return '';
            const gen = parts[1].toLowerCase();
            if (gen.endsWith('ae')) return 'A';
            if (gen.endsWith('i')) return 'O';
            if (gen.endsWith('is')) return 'K';
            if (gen.endsWith('ei')) return 'E';
            if (gen.endsWith('us')) return 'U';
            return '';
        };

        const formatInterval = (days) => {
            if (days === 1) return "1 Tag";
            if (days < 30) return `${Math.round(days)} Tage`;
            if (days < 365) return `${Math.round(days / 30)} Monate`;
            return `${Math.round(days / 365)} Jahre`;
        };

        const calculateSM2 = (quality, card) => {
            let { easeFactor, interval, repetitions } = card;
            let showAfter = 0; 
            let reQueue = false;
            let displayInterval = "";

            if (quality === 0) {
                repetitions = 0;
                interval = 0; 
                easeFactor = Math.max(1.3, easeFactor - 0.2);
                showAfter = Date.now() + 1 * 60000; 
                reQueue = true;
                displayInterval = "1 Min";
            } else if (quality === 1 && interval === 0) {
                showAfter = Date.now() + 10 * 60000; 
                reQueue = true;
                displayInterval = "10 Min";
            } else {
                if (repetitions === 0) {
                    if (quality === 1) interval = 1;
                    else if (quality === 2) interval = 1;
                    else interval = 4;
                } else if (repetitions === 1) interval = 6;
                else {
                    let modifier = 1;
                    if (quality === 1) modifier = 1.2;
                    else if (quality === 2) modifier = easeFactor;
                    else if (quality === 3) modifier = easeFactor * 1.3;
                    interval = Math.round(Math.max(1, interval) * modifier);
                }
                repetitions += 1;
                if (quality === 3) easeFactor += 0.15;
                if (quality === 1) easeFactor = Math.max(1.3, easeFactor - 0.15);
                displayInterval = formatInterval(interval);
            }

            const nextReview = reQueue ? showAfter : Date.now() + (interval * 24 * 60 * 60 * 1000);
            return { easeFactor, interval, repetitions, nextReview, status: 'learning', showAfter, reQueue, displayInterval };
        };

        function Dashboard({ stats, newCardsLimit, setNewCardsLimit, shuffleNewCards, setShuffleNewCards, onStartSession }) {
            const todayNames = ["Morgen", "Übermorgen", "In 3 Tagen", "In 4 Tagen", "In 5 Tagen", "In 6 Tagen", "In 7 Tagen"];
            const totalSessionCards = stats.dueCards.length + Math.min(newCardsLimit, stats.newCards.length);

            return (
                <div className="space-y-8 animate-fade-in">
                    <header className="mb-8">
                        <h1 className="text-3xl font-serif font-bold text-slate-900 mb-2">Salve, Studiosus!</h1>
                        <p className="text-slate-600">Dein täglicher Überblick über deinen Lernfortschritt.</p>
                    </header>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 flex flex-col items-center justify-center">
                            <span className="text-4xl font-black text-rose-500">{stats.dueCards.length}</span>
                            <span className="text-slate-500 font-medium mt-2 uppercase tracking-wider text-xs">Heute Fällig</span>
                        </div>
                        <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 flex flex-col items-center justify-center">
                            <span className="text-4xl font-black text-sky-500">{stats.newCards.length}</span>
                            <span className="text-slate-500 font-medium mt-2 uppercase tracking-wider text-xs">Neue Verfügbar</span>
                        </div>
                        <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 flex flex-col items-center justify-center">
                            <span className="text-4xl font-black text-emerald-500">{stats.learningCards.length}</span>
                            <span className="text-slate-500 font-medium mt-2 uppercase tracking-wider text-xs">Im Lernzyklus</span>
                        </div>
                    </div>
                    <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                        <h2 className="text-xl font-bold mb-4 text-slate-800">Tagesziel festlegen</h2>
                        <div className="flex flex-col md:flex-row items-start md:items-center gap-6">
                            <div className="flex-1 w-full">
                                <label className="block text-sm font-medium text-slate-600 mb-2">Zusätzliche NEUE Karten heute lernen:</label>
                                <input type="range" min="0" max="50" step="5" value={newCardsLimit} onChange={(e) => setNewCardsLimit(parseInt(e.target.value))} className="w-full accent-indigo-600 h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer" />
                                <div className="flex justify-between text-xs text-slate-400 mt-2 font-bold">
                                    <span>0</span><span className="text-indigo-600 bg-indigo-50 px-2 py-1 rounded">{newCardsLimit} Karten</span><span>50</span>
                                </div>
                                <div className="mt-4 flex items-center gap-2">
                                    <input type="checkbox" id="shuffleToggle" checked={shuffleNewCards} onChange={(e) => setShuffleNewCards(e.target.checked)} className="w-4 h-4 accent-indigo-600 cursor-pointer rounded" />
                                    <label htmlFor="shuffleToggle" className="text-sm font-medium text-slate-600 cursor-pointer">Neue Karten querbeet aus dem Deck mischen</label>
                                </div>
                            </div>
                            <button onClick={onStartSession} disabled={totalSessionCards === 0} className="w-full md:w-auto mt-4 md:mt-0 px-8 py-4 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl shadow-md transition-all disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2">
                                <Icon name="Play" className="w-5 h-5"/> Lerneinheit starten ({totalSessionCards})
                            </button>
                        </div>
                    </div>
                    <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                        <h2 className="text-xl font-bold mb-4 text-slate-800 flex items-center gap-2">
                            <Icon name="Calendar" className="text-indigo-500"/> Vorschau: Nächste 7 Tage
                        </h2>
                        <div className="flex flex-col gap-4">
                            {stats.forecast.map((count, index) => (
                                <div key={index} className="flex items-center gap-4">
                                    <div className="w-28 text-sm font-medium text-slate-500 text-right">{todayNames[index]}</div>
                                    <div className="flex-1 bg-slate-100 rounded-full h-3 overflow-hidden flex items-center">
                                        <div 
                                            className="bg-sky-400 h-full rounded-full transition-all duration-500" 
                                            style={{ width: `${Math.min(100, (count / Math.max(20, ...stats.forecast)) * 100)}%` }}
                                        ></div>
                                    </div>
                                    <div className="w-12 text-sm font-bold text-slate-700">{count}</div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        function StudySession({ sessionQueue: initialQueue, setDeck, onFinish }) {
            const [queue, setQueue] = useState(initialQueue.map(c => ({...c, showAfter: 0})));
            const [showAnswer, setShowAnswer] = useState(false);
            // Inputs angepasst: genitiv wird zu formen
            const [inputs, setInputs] = useState({ formen: '', genus: '', deklination: '', bedeutung: '' });
            const [now, setNow] = useState(Date.now());

            useEffect(() => {
                const timer = setInterval(() => setNow(Date.now()), 1000);
                return () => clearInterval(timer);
            }, []);

            if (queue.length === 0) {
                return (
                    <div className="flex flex-col items-center justify-center py-20 text-center space-y-6 animate-fade-in">
                        <div className="w-20 h-20 bg-emerald-100 text-emerald-500 rounded-full flex items-center justify-center">
                            <Icon name="Check" className="w-10 h-10" />
                        </div>
                        <h2 className="text-3xl font-serif font-bold text-slate-800">Sitzung abgeschlossen!</h2>
                        <p className="text-slate-600">Du hast das Tagesziel erreicht. Sehr gut gemacht!</p>
                        <button onClick={onFinish} className="px-6 py-3 bg-indigo-600 text-white rounded-xl shadow-md hover:bg-indigo-700 font-bold transition-all">Zurück zum Dashboard</button>
                    </div>
                );
            }

            const readyIndex = queue.findIndex(c => !c.showAfter || c.showAfter <= now);

            if (readyIndex === -1) {
                const sortedQueue = [...queue].sort((a, b) => a.showAfter - b.showAfter);
                return (
                    <div className="max-w-md mx-auto py-10 text-center space-y-6 animate-fade-in">
                        <div className="w-16 h-16 bg-indigo-100 text-indigo-500 rounded-full flex items-center justify-center mx-auto">
                            <Icon name="Clock" className="w-8 h-8" />
                        </div>
                        <h2 className="text-2xl font-bold text-slate-800">Karten laden auf...</h2>
                        <p className="text-slate-500 text-sm">Diese Vokabeln hast du vor kurzem gelernt. Dein Gehirn braucht eine kurze Pause, bevor sie zur Festigung wieder abgefragt werden.</p>
                        
                        <div className="space-y-3 mt-6">
                            {sortedQueue.map(c => {
                                const waitTime = Math.max(0, Math.ceil((c.showAfter - now) / 1000));
                                const m = Math.floor(waitTime / 60);
                                const s = waitTime % 60;
                                return (
                                    <div key={c.id} className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex justify-between items-center">
                                        <span className="font-serif font-bold text-slate-700">{c.stamm}-</span>
                                        <span className="text-indigo-600 font-mono font-bold bg-indigo-50 px-2 py-1 rounded">
                                            {m}:{s < 10 ? '0':''}{s}
                                        </span>
                                    </div>
                                )
                            })}
                        </div>
                        <button onClick={() => setQueue(queue.map(c => ({...c, showAfter: 0})))} className="mt-8 text-sm text-slate-400 hover:text-indigo-500 font-medium">
                            Timer überspringen (Sofort abfragen)
                        </button>
                    </div>
                );
            }

            const card = queue[readyIndex];
            const simAgain = calculateSM2(0, card);
            const simHard = calculateSM2(1, card);
            const simGood = calculateSM2(2, card);
            const simEasy = calculateSM2(3, card);

            const handleCheck = (e) => { e.preventDefault(); setShowAnswer(true); };

            const handleRate = (quality) => {
                const result = calculateSM2(quality, card);
                setDeck(prevDeck => prevDeck.map(c => c.id === card.id ? { ...c, ...result } : c));
                
                const newQueue = [...queue];
                newQueue.splice(readyIndex, 1); 
                
                if (result.reQueue) {
                    newQueue.push({ ...card, ...result });
                }
                
                setQueue(newQueue);
                setInputs({ formen: '', genus: '', deklination: '', bedeutung: '' });
                setShowAnswer(false);
            };

            const isFormenCorrect = checkMatchForms(inputs.formen, card.formen);

            return (
                <div className="max-w-2xl mx-auto w-full flex-1 flex flex-col animate-fade-in">
                    <header className="flex justify-between items-center mb-6 w-full">
                        <div className="text-slate-500 text-sm font-bold bg-white px-3 py-1 rounded-full border border-slate-200 shadow-sm flex items-center gap-2">
                            <span>Karte {initialQueue.length - queue.length + 1} von {initialQueue.length}</span>
                        </div>
                        <button onClick={onFinish} className="text-slate-400 hover:text-slate-600 font-medium flex items-center gap-1 transition-colors">
                            <Icon name="X" className="w-4 h-4"/> Abbrechen
                        </button>
                    </header>

                    <div className="bg-white p-8 rounded-2xl shadow-xl border border-slate-200 mb-6 text-center relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-full h-1 bg-indigo-500"></div>
                        <h2 className="text-xs text-slate-400 uppercase tracking-widest font-bold mb-3">Wortstamm</h2>
                        <p className="text-5xl font-serif text-slate-900 font-bold">{card.stamm}-</p>
                    </div>

                    <form onSubmit={handleCheck} className="bg-white p-6 rounded-2xl shadow-lg border border-slate-200 mb-6 space-y-5">
                        {/* FORMEN EINGABE */}
                        <div>
                            <label className="block text-sm font-bold text-slate-600 mb-2">Formen (Nom Sg, Gen Sg, Nom Pl, Gen Pl)</label>
                            <div className="relative">
                                <input autoFocus type="text" value={inputs.formen} onChange={(e) => setInputs({...inputs, formen: e.target.value})} disabled={showAnswer} className={`w-full bg-slate-50 border ${showAnswer ? (isFormenCorrect ? 'border-emerald-500 bg-emerald-50 text-emerald-700' : 'border-rose-500 bg-rose-50 text-rose-700') : 'border-slate-300 focus:border-indigo-500'} rounded-xl p-3 outline-none transition-colors`} placeholder="z.B. luna, lunae, lunae, lunarum" />
                                {showAnswer && !isFormenCorrect && <div className="mt-2 text-emerald-600 font-bold text-sm bg-emerald-50 px-3 py-2 rounded border border-emerald-100">Lösung: {card.formen}</div>}
                            </div>
                        </div>

                        <div className="grid grid-cols-2 gap-4">
                            <div>
                                <label className="block text-sm font-bold text-slate-600 mb-2">Genus</label>
                                <div className="flex rounded-xl overflow-hidden border border-slate-300">
                                    {['m', 'f', 'n'].map(g => {
                                        let btnClass = "flex-1 py-3 font-bold uppercase transition-colors border-r last:border-r-0 border-slate-300 ";
                                        if (!showAnswer) btnClass += inputs.genus === g ? "bg-indigo-600 text-white" : "bg-slate-50 text-slate-500 hover:bg-slate-200";
                                        else {
                                            if (g === card.genus) btnClass += "bg-emerald-100 text-emerald-700";
                                            else if (inputs.genus === g) btnClass += "bg-rose-100 text-rose-700";
                                            else btnClass += "bg-slate-50 text-slate-400";
                                        }
                                        return <button key={g} type="button" disabled={showAnswer} onClick={() => setInputs({...inputs, genus: g})} className={btnClass}>{g}</button>;
                                    })}
                                </div>
                            </div>
                            <div>
                                <label className="block text-sm font-bold text-slate-600 mb-2">Deklination</label>
                                <select disabled={showAnswer} value={inputs.deklination} onChange={(e) => setInputs({...inputs, deklination: e.target.value})} className={`w-full bg-slate-50 border ${showAnswer ? (inputs.deklination === card.deklination ? 'border-emerald-500 bg-emerald-50 text-emerald-700' : 'border-rose-500 bg-rose-50 text-rose-700') : 'border-slate-300 focus:border-indigo-500'} rounded-xl p-3 outline-none appearance-none font-bold`}>
                                    <option value="">Wählen...</option>
                                    {['A', 'O', 'K', 'U', 'E'].map(d => <option key={d} value={d}>{d}-Deklination</option>)}
                                </select>
                                {showAnswer && inputs.deklination !== card.deklination && <div className="mt-1 text-emerald-600 text-xs font-bold text-right">Lösung: {card.deklination}</div>}
                            </div>
                        </div>

                        <div>
                            <label className="block text-sm font-bold text-slate-600 mb-2">Bedeutung</label>
                            <div className="relative">
                                <input type="text" value={inputs.bedeutung} onChange={(e) => setInputs({...inputs, bedeutung: e.target.value})} disabled={showAnswer} className={`w-full bg-slate-50 border ${showAnswer ? 'border-slate-300 text-slate-500' : 'border-slate-300 focus:border-indigo-500'} rounded-xl p-3 outline-none transition-colors`} placeholder="Deutsche Übersetzung..." />
                                {showAnswer && (
                                    <div className="mt-3 p-4 bg-emerald-50 border border-emerald-200 rounded-xl text-emerald-800 flex items-start gap-3">
                                        <Icon name="Check" className="w-5 h-5 flex-shrink-0 mt-0.5"/>
                                        <div>
                                            <span className="text-emerald-600/80 text-xs font-bold uppercase tracking-wider block mb-1">Echte Bedeutung</span>
                                            <span className="font-bold">{card.bedeutung}</span>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>

                        {!showAnswer ? (
                            <button type="submit" className="w-full mt-4 py-4 bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-lg rounded-xl shadow-md transition-all">Prüfen</button>
                        ) : (
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-3 pt-4 border-t border-slate-100">
                                <button type="button" onClick={() => handleRate(0)} className="flex flex-col items-center p-3 bg-rose-50 hover:bg-rose-100 border border-rose-200 rounded-xl transition-all">
                                    <span className="text-rose-600 font-bold mb-1">Nochmal</span>
                                    <span className="text-xs text-rose-400 font-medium">{simAgain.displayInterval}</span>
                                </button>
                                <button type="button" onClick={() => handleRate(1)} className="flex flex-col items-center p-3 bg-orange-50 hover:bg-orange-100 border border-orange-200 rounded-xl transition-all">
                                    <span className="text-orange-600 font-bold mb-1">Schwer</span>
                                    <span className="text-xs text-orange-400 font-medium">{simHard.displayInterval}</span>
                                </button>
                                <button type="button" onClick={() => handleRate(2)} className="flex flex-col items-center p-3 bg-indigo-50 hover:bg-indigo-100 border border-indigo-200 rounded-xl transition-all">
                                    <span className="text-indigo-600 font-bold mb-1">Gut</span>
                                    <span className="text-xs text-indigo-400 font-medium">{simGood.displayInterval}</span>
                                </button>
                                <button type="button" onClick={() => handleRate(3)} className="flex flex-col items-center p-3 bg-emerald-50 hover:bg-emerald-100 border border-emerald-200 rounded-xl transition-all">
                                    <span className="text-emerald-600 font-bold mb-1">Einfach</span>
                                    <span className="text-xs text-emerald-400 font-medium">{simEasy.displayInterval}</span>
                                </button>
                            </div>
                        )}
                    </form>
                </div>
            );
        }

        function CardManager({ deck, setDeck }) {
            const [importMode, setImportMode] = useState('text');
            const [importText, setImportText] = useState('');

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    const text = event.target.result;
                    const lines = text.split('\n').filter(l => l.trim() !== '');
                    if (lines.length < 2) return;
                    // Standard CSV Format Unterstützung
                    const headers = lines[0].toLowerCase().split(/[;,]/).map(h => h.trim());
                    const parsedCards = [];
                    for (let i = 1; i < lines.length; i++) {
                        const values = lines[i].split(/[;,]/).map(v => v.trim());
                        const cardData = {};
                        headers.forEach((h, index) => { cardData[h] = values[index] || ''; });
                        if (cardData.stamm && cardData.formen) {
                            parsedCards.push({
                                id: generateId(),
                                stamm: cardData.stamm, formen: cardData.formen, genus: cardData.genus || 'n',
                                deklination: cardData.deklination || autoDetectDeklination(cardData.stamm, cardData.formen),
                                bedeutung: cardData.bedeutung || '',
                                status: 'new', interval: 0, easeFactor: 2.5, repetitions: 0, nextReview: 0,
                            });
                        }
                    }
                    if(parsedCards.length > 0) {
                        setDeck(prev => [...prev, ...parsedCards]);
                        alert(`${parsedCards.length} Karten erfolgreich importiert!`);
                    } else {
                        alert("Fehler: Spalten 'stamm' und 'formen' nicht gefunden.");
                    }
                };
                reader.readAsText(file);
            };

            const processTextImport = () => {
                if (!importText.trim()) return;
                const lines = importText.split('\n');
                const importedCards = [];

                lines.forEach((line, index) => {
                    if(!line.trim()) return;
                    // Da die Formen Kommas enthalten können, ist Semikolon das sicherste Trennzeichen
                    const cols = line.split(';').map(s => s.trim());
                    if (index === 0 && cols[0].toLowerCase() === 'stamm') return;

                    let stamm, formen, genusRaw, deklRaw, bed = '';
                    if (cols.length >= 5) [stamm, formen, genusRaw, deklRaw, bed] = cols;
                    else if (cols.length === 4) { [stamm, formen, genusRaw, bed] = cols; deklRaw = ''; } 
                    else return;

                    const genus = genusRaw.toLowerCase().replace(/[^mfn]/g, '') || 'n'; 
                    
                    if(stamm && formen && bed) {
                        importedCards.push({
                            id: generateId(), stamm: stamm, formen: formen, genus: genus,
                            deklination: deklRaw || autoDetectDeklination(stamm, formen),
                            bedeutung: bed, status: 'new', interval: 0, easeFactor: 2.5, repetitions: 0, nextReview: 0
                        });
                    }
                });

                if (importedCards.length > 0) {
                    setDeck(prev => [...prev, ...importedCards]);
                    alert(`${importedCards.length} Vokabeln erfolgreich importiert!`);
                    setImportText('');
                } else {
                    alert('Keine gültigen Zeilen gefunden. Bitte Format prüfen (Semikolon als Trenner).');
                }
            };

            return (
                <div className="space-y-6 animate-fade-in">
                    <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                        <div className="flex justify-between items-center mb-6">
                            <h2 className="text-xl font-bold flex items-center gap-2"><Icon name="Database"/> Vokabeln Importieren</h2>
                            <div className="flex bg-slate-100 rounded-lg p-1">
                                <button onClick={() => setImportMode('text')} className={`px-4 py-1.5 text-sm font-bold rounded-md transition-all ${importMode === 'text' ? 'bg-white shadow text-indigo-600' : 'text-slate-500 hover:text-slate-700'}`}>Text-Liste</button>
                                <button onClick={() => setImportMode('file')} className={`px-4 py-1.5 text-sm font-bold rounded-md transition-all ${importMode === 'file' ? 'bg-white shadow text-indigo-600' : 'text-slate-500 hover:text-slate-700'}`}>.CSV Datei</button>
                            </div>
                        </div>

                        {importMode === 'text' ? (
                            <div className="animate-fade-in">
                                <p className="text-sm text-slate-500 mb-3">Format (mit <b>Semikolon</b> getrennt!): <code className="bg-slate-100 px-2 py-1 rounded text-slate-700">stamm; formen; genus; deklination(optional); bedeutung</code></p>
                                <textarea className="w-full h-32 p-4 text-sm font-mono border border-slate-300 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none resize-y mb-3" placeholder="lun; luna, lunae, lunae, lunarum; f; A; der Mond&#10;muscul; musculus, musculi, musculi, musculorum; m; O; der Muskel" value={importText} onChange={(e) => setImportText(e.target.value)} />
                                <button onClick={processTextImport} className="bg-indigo-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-indigo-700 transition-colors">Importieren</button>
                            </div>
                        ) : (
                            <div className="border-2 border-dashed border-slate-300 rounded-xl p-8 text-center bg-slate-50 animate-fade-in">
                                <Icon name="Upload" className="w-10 h-10 mx-auto text-slate-400 mb-3"/>
                                <input type="file" accept=".csv" onChange={handleFileUpload} className="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 cursor-pointer mx-auto max-w-xs" />
                                <p className="text-xs text-slate-400 mt-4">Spalten: stamm, formen, genus, deklination, bedeutung</p>
                            </div>
                        )}
                        
                        <div className="mt-6 flex justify-end border-t border-slate-100 pt-4">
                            <button onClick={() => { if(window.confirm('Wirklich ALLE Vokabeln löschen?')) setDeck([]) }} className="text-rose-500 text-sm font-bold flex items-center gap-1 hover:text-rose-600 bg-rose-50 px-3 py-1.5 rounded-lg">
                                <Icon name="Trash2" className="w-4 h-4"/> Alle Karten löschen
                            </button>
                        </div>
                    </div>

                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                        <div className="overflow-x-auto">
                            <table className="w-full text-left text-sm text-slate-600">
                                <thead className="bg-slate-50 text-slate-500 uppercase font-bold text-xs border-b border-slate-200">
                                    <tr>
                                        <th className="px-4 py-3">Stamm</th>
                                        <th className="px-4 py-3">Formen (Sg & Pl)</th>
                                        <th className="px-4 py-3">Bedeutung</th>
                                        <th className="px-4 py-3">Status</th>
                                        <th className="px-4 py-3">Intervall</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100">
                                    {deck.map(card => (
                                        <tr key={card.id} className="hover:bg-slate-50">
                                            <td className="px-4 py-3 font-serif font-bold text-slate-900">{card.stamm}-</td>
                                            <td className="px-4 py-3">{card.formen} <span className="text-xs bg-slate-200 text-slate-700 px-1.5 py-0.5 rounded font-bold uppercase ml-1">{card.genus}</span> <span className="text-xs text-slate-400 ml-1">{card.deklination}-Dekl</span></td>
                                            <td className="px-4 py-3 truncate max-w-[200px]">{card.bedeutung}</td>
                                            <td className="px-4 py-3">
                                                {card.status === 'new' ? 
                                                    <span className="bg-sky-100 text-sky-700 px-2 py-1 rounded text-xs font-bold">Neu</span> : 
                                                    <span className="bg-emerald-100 text-emerald-700 px-2 py-1 rounded text-xs font-bold">Lvl {card.repetitions}</span>
                                                }
                                            </td>
                                            <td className="px-4 py-3 text-xs text-slate-400 font-bold">
                                                {card.interval === 0 ? '< 1 Tag' : formatInterval(card.interval)}
                                            </td>
                                        </tr>
                                    ))}
                                    {deck.length === 0 && (
                                        <tr><td colSpan="5" className="px-4 py-8 text-center text-slate-400 font-medium">Noch keine Vokabeln in der Datenbank.</td></tr>
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        }

        function App() {
            const [deck, setDeck] = useState([]);
            const [view, setView] = useState('dashboard');
            const [newCardsLimit, setNewCardsLimit] = useState(10);
            const [shuffleNewCards, setShuffleNewCards] = useState(false);
            const [sessionQueue, setSessionQueue] = useState([]);
            const [isLoaded, setIsLoaded] = useState(false);

            useEffect(() => {
                // NEUE SPEICHER-ID: v5 (Wegen Umstellung von nominativ/genitiv auf stamm/formen)
                const savedDeck = localStorage.getItem('anki_latin_deck_v5');
                const savedLimit = localStorage.getItem('anki_new_limit_v5');
                const savedShuffle = localStorage.getItem('anki_shuffle_new_v5');
                if (savedDeck) setDeck(JSON.parse(savedDeck));
                if (savedLimit) setNewCardsLimit(parseInt(savedLimit, 10));
                if (savedShuffle !== null) setShuffleNewCards(savedShuffle === 'true');
                setIsLoaded(true);
            }, []);

            useEffect(() => {
                if (isLoaded) {
                    localStorage.setItem('anki_latin_deck_v5', JSON.stringify(deck));
                    localStorage.setItem('anki_new_limit_v5', newCardsLimit.toString());
                    localStorage.setItem('anki_shuffle_new_v5', shuffleNewCards.toString());
                }
            }, [deck, newCardsLimit, shuffleNewCards, isLoaded]);

            const stats = useMemo(() => {
                const now = Date.now();
                const dueCards = deck.filter(c => c.status === 'learning' && c.nextReview <= now);
                const newCards = deck.filter(c => c.status === 'new');
                const learningCards = deck.filter(c => c.status === 'learning' && c.nextReview > now);

                const forecast = Array(7).fill(0);
                const todayEnd = new Date().setHours(23, 59, 59, 999);
                deck.forEach(c => {
                    if (c.status !== 'learning') return;
                    for(let i=1; i<=7; i++) {
                        if (c.nextReview > todayEnd + ((i-1) * 86400000) && c.nextReview <= todayEnd + (i * 86400000)) {
                            forecast[i-1]++;
                        }
                    }
                });

                return { dueCards, newCards, learningCards, forecast };
            }, [deck]);

            const startSession = () => {
                let selectedNew = [];
                if (shuffleNewCards) {
                    let shuffled = [...stats.newCards];
                    for (let i = shuffled.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
                    }
                    selectedNew = shuffled.slice(0, newCardsLimit);
                } else {
                    selectedNew = stats.newCards.slice(0, newCardsLimit);
                }

                const sessionCards = [...stats.dueCards, ...selectedNew];
                
                for (let i = sessionCards.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [sessionCards[i], sessionCards[j]] = [sessionCards[j], sessionCards[i]];
                }
                
                setSessionQueue(sessionCards);
                setView('study');
            };

            if (!isLoaded) return <div className="min-h-screen flex items-center justify-center font-bold text-slate-400">Lade Vocabula Pro...</div>;

            return (
                <div className="min-h-screen pb-20 md:pb-0">
                    <nav className="bg-slate-900 text-white shadow-md sticky top-0 z-50">
                        <div className="max-w-4xl mx-auto px-4">
                            <div className="flex justify-between items-center h-16">
                                <div className="flex items-center space-x-2 font-serif text-xl font-bold tracking-wide">
                                    <Icon name="BookOpen" className="w-6 h-6 text-indigo-400" />
                                    <span>Vocabula <span className="text-indigo-400">Pro</span></span>
                                </div>
                                <div className="hidden md:flex space-x-2">
                                    <button onClick={() => setView('dashboard')} className={`px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2 transition-colors ${view === 'dashboard' ? 'bg-indigo-600 text-white' : 'text-slate-300 hover:bg-slate-800'}`}>
                                        <Icon name="BarChart2" className="w-4 h-4"/> Übersicht
                                    </button>
                                    <button onClick={() => setView('manage')} className={`px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2 transition-colors ${view === 'manage' ? 'bg-indigo-600 text-white' : 'text-slate-300 hover:bg-slate-800'}`}>
                                        <Icon name="List" className="w-4 h-4"/> Karten verwalten
                                    </button>
                                </div>
                            </div>
                        </div>
                    </nav>

                    <main className="max-w-4xl mx-auto p-4 py-8">
                        {view === 'dashboard' && <Dashboard stats={stats} newCardsLimit={newCardsLimit} setNewCardsLimit={setNewCardsLimit} shuffleNewCards={shuffleNewCards} setShuffleNewCards={setShuffleNewCards} onStartSession={startSession} />}
                        {view === 'study' && <StudySession sessionQueue={sessionQueue} setDeck={setDeck} onFinish={() => setView('dashboard')} />}
                        {view === 'manage' && <CardManager deck={deck} setDeck={setDeck} />}
                    </main>

                    <div className="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 flex justify-around p-2 z-50 shadow-[0_-5px_15px_-10px_rgba(0,0,0,0.1)]">
                        <button onClick={() => setView('dashboard')} className={`flex flex-col items-center p-2 w-full ${view === 'dashboard' ? 'text-indigo-600' : 'text-slate-400'}`}>
                            <Icon name="BarChart2" className="w-6 h-6" /><span className="text-[10px] font-bold mt-1">Home</span>
                        </button>
                        <button onClick={() => setView('manage')} className={`flex flex-col items-center p-2 w-full ${view === 'manage' ? 'text-indigo-600' : 'text-slate-400'}`}>
                            <Icon name="List" className="w-6 h-6" /><span className="text-[10px] font-bold mt-1">Manager</span>
                        </button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
